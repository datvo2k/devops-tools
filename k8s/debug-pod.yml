# =============================================================================
# Network Debug Pod — Production-ready, multi-cloud (EKS / GKE / AKS / bare-k8s)
#
# Quick start
#   kubectl apply -f k8s/debug-pod.yml [-n <namespace>]
#   kubectl exec -it network-debug -- bash [-n <namespace>]
#   kubectl delete -f k8s/debug-pod.yml  [-n <namespace>]
#
# Port-forward (reach the pod from your laptop)
#   kubectl port-forward pod/network-debug 8080:8080 [-n <namespace>]
apiVersion: v1
kind: ServiceAccount
metadata:
  name: network-debug-sa
  labels:
    app: network-debug
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: network-debug-viewer
  labels:
    app: network-debug
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - nodes
      - namespaces
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: network-debug-viewer-binding
  labels:
    app: network-debug
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: network-debug-viewer
subjects:
  - kind: ServiceAccount
    name: network-debug-sa
    namespace: default
---
apiVersion: v1
kind: Pod
metadata:
  name: network-debug
  labels:
    app: network-debug
    purpose: debugging
  annotations:
    # Opt-out of Istio/Linkerd sidecar injection so debug traffic is unaffected
    sidecar.istio.io/inject: "false"
    linkerd.io/inject: disabled
spec:
  serviceAccountName: network-debug-sa
  restartPolicy: Never
  containers:
    - name: network-debug
      image: network-debug:latest
      imagePullPolicy: Always
      command: ["sleep", "infinity"]
      stdin: true
      tty: true

      securityContext:
        runAsUser: 0
        capabilities:
          add:
            - NET_ADMIN
            - NET_RAW
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      volumeMounts:
        - name: debug-data
          mountPath: /debug
  volumes:
    - name: debug-data
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: network-debug-svc
  labels:
    app: network-debug
spec:
  type: ClusterIP
  selector:
    app: network-debug
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: alt-http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
